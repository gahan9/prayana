name: Extended Tests

on:
  workflow_dispatch:
    inputs:
      test_tier:
        description: "Test tier to run"
        required: true
        default: "extended"
        type: choice
        options:
          - extended
          - perf
          - concurrency
          - full
  workflow_call:
    inputs:
      test_tier:
        required: false
        default: "extended"
        type: string

concurrency:
  group: extended-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
  NEXT_PUBLIC_APP_URL: https://prayana-app.web.app

jobs:
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: contains(fromJSON('["extended", "perf", "full"]'), inputs.test_tier || 'extended')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        run: npm run test:perf

  concurrency:
    name: Concurrency Tests
    runs-on: ubuntu-latest
    if: contains(fromJSON('["extended", "concurrency", "full"]'), inputs.test_tier || 'extended')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run concurrency tests
        run: npm run test:concurrency

  full-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    if: inputs.test_tier == 'full'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm run test:full

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-coverage-report
          path: coverage/
          retention-days: 7
