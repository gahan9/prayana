name: Manual Review

on:
  workflow_dispatch:
    inputs:
      run_full_tests:
        description: "Run full test suite"
        required: false
        default: true
        type: boolean
      run_bundle_analysis:
        description: "Run bundle size analysis"
        required: false
        default: true
        type: boolean

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
  NEXT_PUBLIC_APP_URL: https://prayana-app.web.app

jobs:
  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    if: inputs.run_full_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage
        run: npm run test:full -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: review-coverage
          path: coverage/
          retention-days: 14

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    if: inputs.run_bundle_analysis
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle analyzer
        run: ANALYZE=true npm run build
        env:
          ANALYZE: "true"

      - name: Check repo size
        run: |
          SIZE=$(du -sb --exclude=node_modules --exclude=.next --exclude=.git . | cut -f1)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "## Repo Size: ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          if [ "$(echo "$SIZE > 10485760" | bc)" -eq 1 ]; then
            echo "::warning::Repo size exceeds 10 MB limit"
          fi

      - name: Build size report
        run: |
          echo "## Build Output Sizes" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh .next/static/* 2>/dev/null || echo "No static output"
          du -sh .next/server/chunks/*.js 2>/dev/null | head -20 || echo "No chunks"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [full-tests, bundle-analysis]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Manual Review Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Full Tests | ${{ needs.full-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle Analysis | ${{ needs.bundle-analysis.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggered by: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Ref: ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
