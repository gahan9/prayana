name: Backend API Connectors

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    name: Backend API Connectors – ${{ matrix.environment.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        environment:
          # URL precedence:
          # 1) BACKEND_*_HEALTH_URL repository variable
          # 2) NEXT_PUBLIC_*_APP_URL repository variable
          # 3) hardcoded default URL
          - name: Production
            url: ${{ vars.BACKEND_PRODUCTION_HEALTH_URL || vars.NEXT_PUBLIC_APP_URL || 'https://prayana-app.web.app' }}
          - name: Staging
            url: ${{ vars.BACKEND_STAGING_HEALTH_URL || vars.NEXT_PUBLIC_STAGING_APP_URL || 'https://prayana-app--staging.web.app' }}

    steps:
      - name: Ping /api/health
        id: health
        run: |
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 10 \
            --retry 3 \
            --retry-delay 5 \
            "${{ matrix.environment.url }}/api/health")

          echo "http_status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed for ${{ matrix.environment.name }} (HTTP $STATUS)"
            exit 1
          fi

          echo "✅ Health check passed for ${{ matrix.environment.name }} (HTTP $STATUS)"
          cat /tmp/health.json

      - name: Validate response schema
        if: steps.health.outputs.http_status == '200'
        run: |
          python3 - <<'PY'
          import json

          with open("/tmp/health.json", "r", encoding="utf-8") as stream:
              payload = json.load(stream)

          assert payload.get("status") == "ok", f"invalid status: {payload.get('status')}"

          services = payload.get("services", {})
          assert services.get("firestore") == "ok", "firestore connector status must be 'ok'"
          assert services.get("auth") == "ok", "auth connector status must be 'ok'"
          assert services.get("storage") == "ok", "storage connector status must be 'ok'"

          print("✅ Response schema valid with connectors")
          PY

      - name: Create GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const title = `🚨 Health check failed: ${{ matrix.environment.name }}`;
            const body = [
              '## Health Check Failure',
              '',
              `**Environment:** ${{ matrix.environment.name }}`,
              `**URL:** ${{ matrix.environment.url }}/api/health`,
              `**HTTP Status:** ${{ steps.health.outputs.http_status }}`,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Time:** ${new Date().toISOString()}`,
            ].join('\n');

            // Search for an existing open issue to avoid duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check,incident',
            });

            const existing = issues.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['health-check', 'incident', 'bug'],
              });
            }
